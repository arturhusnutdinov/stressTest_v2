company:
  name: UC RUSAL
  industry: metals
  currency: USD
  accounting_standard: IFRS
accounting_conventions:
  da_in_cogs: false
  capitalize_interest: false
  interest_in_cff: false
  da_presentation: separate_line
  is_income_sign: natural
macro_forecast:
  profile: vecm_default
  config: companies/rusal/configs/forecast/macro_ecm.yaml
  factors:
  - lme_aluminium
  - lme_alumina
  - usd_rub
  - brent
  - gdp_world
  - cpi_ru
  - ppi_ru
  - russian_power_price
  policy:
    factors:
    - lme_aluminium
    - gdp_world
    - usd_rub
  search_paths:
  - companies/rusal/drivers
  - companies/rusal/data/macro
  - macro/industry/aluminum/drivers
  - macro/global/drivers
  # External macro: integration with modelMacro (quarterly ECM, 13 equations)
  # Overrides built-in VECM/MR for covered factors (brent, usd_rub, cpi_ru, cbr_key_rate, gdp_ru)
  # Remaining factors (lme_aluminium, lme_alumina, gdp_world, russian_power_price) → VECM/MR/EWA as before
  external:
    enabled: false   # set to true to load from modelMacro scenario_results.csv
    source_path: /Users/arturhusnutdinov/Documents/IT Development/modelMacro
    mode: override
    macro:
      scenario_map:
        baseline: base
        low_oil: bear
        collapse: severe
        high_oil: bull
        uae_bearish: sanctions_shock
        uae_moderate: energy_spike
      variable_map:
        POIL: brent
        RUBUSD: usd_rub
        R: cbr_key_rate
      # CPI→cpi_ru (level→index) and PY→ppi_ru handled automatically
    sector:
      company_sector_map:
        rusal: [mining, manuf]
        nornickel: [mining]
      # drivers: [gva_growth, ipi, wages, npl, leverage]  # all by default
model:
  engine_version: v2
  mode: custom
  standard:
    periods:
      history_start_year: 2011
      history_end_year: 2025
      forecast_start_year: 2026
      forecast_end_year: 2030
      forecast_years: 5
    transforms:
      revenue_target: dln
      revenue_features: dln
    revenue:
      driver: lme_aluminium
      macro_factors:
      - lme_aluminium
      - gdp_world
      - usd_rub
      drivers:
      - lme_aluminium
      - gdp_world
      elasticity: 1.0
      use_elastic_net: true
      l1_ratio: 0.5
      fallback_growth: ewa
      target_transform: dln
      feature_transform: dln
      chainlink_anchor: history_last
      segment_modeling: false
    ewa:
      sgna_halflife_years: 5
      wc_days_halflife_years: 5
    sgna:
      base_method: ewa
      ewa_halflife_years: 5
      transform: dln
      chainlink_anchor: history_last
    margins:
      ebitda_margin_default: 0.12
      # tax_rate_statutory: loaded from preprocessor EWA (~18.5%)
      # Override to 0.25 when 2025+ data loaded with new Russian rate
      tax_rate_delta_pct: 0.0
    capex_policy:
      method: ratio_to_revenue
      ratio_default: 0.09
      maint_as_dep_ratio: 1.0
      capex_useful_life_years: 25.0
      disposals_ratio: history
    ppe:
      mode: full
      useful_life_years: 15
      min_capex_da_ratio: 0.9
    wc:
      method: days
      dio_days: 138
      transform_days: dln
    cogs:
      use_ppi_uplift: false
      clamp:
        min: 0.65
        max: 0.9
    leases:
      enabled: true
      default_discount_rate: 0.06
    debt:
      mode: optimizer
      target_pct_revenue: 0.65
      version: v2_solver
      interest_treatment: separate_line
      target_net_debt_ebitda: 0.0
      max_voluntary_prepay_pct_fcf: 0.5
      rc:
        enable: false
      iter_max: 50
      tol: 1.0e-06
      refinancing:
        enable: true
        mode: simple
        simple:
          extend_years: 5
          rate_adjustment: 0.0
          fees_pct: 0.1
    taxes:
      mode: full
      policy: statutory_with_floor
      nol_opening_balance: 0
      nol_max_utilization_pct: 0.8
      tax_paid_timing: current_year
    intangibles:
      mode: full
      additions_pct_of_revenue: 0.003
      amortization_pct_of_balance: 5.0
    interest_payable:
      mode: full
      payment_timing: current_year
    equity:
      mode: full
      dividend_payout_ratio: 0.0
      buyback_pct_fcf: 0.0
      buyback_leverage_max: 4.0
    train_test:
      train_end_year: 2022
  custom:
    revenue:
      macro_factor: lme_aluminium
      segment_modeling: true
      segments:
        primary_al:
          # Volume in kt (sales), Price in USD/kt (= USD/t × 1000)
          # 2025 actual: sales 4,490 kt @ 2,652 USD/t (AR2025 MDA)
          volume_history: {2017: 3735, 2018: 4176, 2019: 4176, 2020: 3926, 2021: 3904, 2022: 3896, 2023: 4153, 2024: 3859, 2025: 4490}
          price_history:  {2017: 1966000, 2018: 2110000, 2019: 1920000, 2020: 1805000, 2021: 2553000, 2022: 2976000, 2023: 2439000, 2024: 2520000, 2025: 2652000}
          volume_method: ewa
          price_method: macro
          price_factors: [lme_aluminium]
          ewa_halflife: 4.0
        alumina:
          # 2025 actual: sales 1,204 kt @ 537 USD/t (AR2025 MDA)
          volume_history: {2017: 1694, 2018: 1753, 2019: 1753, 2020: 1729, 2021: 1677, 2022: 1169, 2023: 759, 2024: 888, 2025: 1204}
          price_history:  {2017: 406000, 2018: 435000, 2019: 379000, 2020: 308000, 2021: 364000, 2022: 470000, 2023: 676000, 2024: 849000, 2025: 537000}
          volume_method: ewa
          price_method: ewa  # was: macro (broken OLS, beta=-0.72, R²=0.13)
          ewa_halflife: 4.0
        other:
          # Foil + Other products: volume=1 (unit), price = total segment revenue in USD
          # 2025 actual: foil 753M + other products 982M = 1,735M (AR2025 MDA)
          volume_history: {2019: 1, 2020: 1, 2021: 1, 2022: 1, 2023: 1, 2024: 1, 2025: 1}
          price_history:  {2019: 842000000, 2020: 775000000, 2021: 1418000000, 2022: 1831000000, 2023: 1287000000, 2024: 1339000000, 2025: 1735000000}
          volume_method: ewa
          price_method: ewa
          ewa_halflife: 3.0
    cogs:
      mode: component
      alumina_share: 0.37
      energy_share: 0.27
      labour_share: 0.12
      other_share: 0.24
      alumina_intensity: 1.93       # tonnes alumina per tonne Al
      energy_kwh_per_t: 15500.0     # kWh per tonne Al
      mean_reversion_dampening: 0.80  # calibrated: OLS Δln(COGS/Rev)~β×Δln(PPI), β=1.21, R²=0.76; capped at 0.80
      clamp_sigma: 0.09             # calibrated: 1.5 × historical σ(COGS/Rev) = 1.5 × 0.059 = 0.089
      # Rusal is vertically integrated: mines bauxite → refines alumina internally.
      # Internal alumina transfer cost is production-based, not LME spot.
      # LME alumina only affects REVENUE (external alumina sales segment).
      # Set to "none" to disable LME alumina indexation of the cost component.
      commodity_factor: none
    ppe:
      min_capex_da_ratio: 0.9
      expansion_capex_pct_of_rev_growth: 0.1
    debt:
      mode: optimizer
      target_net_debt_ebitda: 3.5
      max_voluntary_prepay_pct_fcf: 0.3
      cbr_key_rate_forecast:
        2026: 0.14
        2027: 0.11
        2028: 0.09
        2029: 0.08
        2030: 0.07
      refinancing:
        fees_pct: 0.001
    taxes:
      # Inherit from standard: mode, policy, nol_*, tax_paid_timing
      tax_rate_statutory: 0.25  # Russian corporate rate from 2025 (was 20%)
      mode: full
      policy: statutory_with_floor
      nol_opening_balance: 0
      nol_max_utilization_pct: 0.8
      tax_paid_timing: current_year
      # Deferred tax temporary difference categories (per Excel prototype)
      # Enable when historical DTA/DTL reflect these categories
      deferred_tax_categories:
        enabled: false    # set to true after calibrating opening DTA/DTL
        ppe:
          blended_dep_rate: 0.1462   # Tax depreciation rate on PP&E
        inventories:
          rate: 0.0291               # Inventory valuation temporary differences
        receivables:
          rate: 0.0808               # Trade & other receivables
        payables:
          rate: 0.0717               # Trade & other payables
    sga:
      # SGA split into sub-lines (IFRS: distribution separate from admin)
      split_enabled: true
      distribution_pct_of_revenue: 0.05    # ~5% historically (2024: 848/12569)
      admin_pct_of_revenue: 0.04           # ~4% historically (2024: 695/12569)
      ecl_pct_of_revenue: 0.003            # Expected credit losses ~0.3%
      other_opex_pct_of_revenue: 0.02      # Other operating expenses ~2%
    provisions:
      # Full corkscrew for provisions (pension, site restoration, legal claims)
      corkscrew_enabled: true
      categories:
        pension:
          annual_charge_pct: 0.12          # ~12% of opening (7/55 avg)
          utilization_pct: 0.08            # ~8% annual utilization
        site_restoration:
          annual_charge_pct: 0.0           # No new provisions historically
          accretion_rate: 0.02             # Passage of time (discount unwind)
          fx_sensitivity: 0.15             # FX impact as % of opening
        legal_claims:
          annual_charge_pct: 0.30          # ~30% of opening (volatile)
          utilization_pct: 0.20            # Settlement rate
    covenants:
      enabled: true
      thresholds:
        net_debt_ebitda:
          max: 4.5
          warning: 4.0
        interest_coverage:
          min: 1.5
          warning: 2.0
        ebitda_margin:
          min: 0.08
          warning: 0.10
solver:
  max_iter: 10
  tol: 1000.0
outputs:
  base: companies/rusal/outputs
features:
  min_cash: 500000000
  use_ppe_corkscrew: true
  use_wc_days: true
  use_tax_corkscrew: true
  use_intangibles_corkscrew: true
  use_interest_payable_cork: true
  use_debt_rc: false
forecast_methods:
  is:
    asset_impairment:
      method: ewa
      ewa_halflife_years: 3
    restructuring:
      method: zero
    earnings_from_investees:
      method: ewa
      ewa_halflife_years: 3
    interest_income:
      method: ewa
      ewa_halflife_years: 2
    other_financial_costs:
      method: ewa
      ewa_halflife_years: 3
  bs:
    goodwill:
      method: last
    restricted_cash:
      method: last
    employee_benefits:
      method: ewa
      ewa_halflife_years: 5
covenants:
  enabled: true
  methodology: default
  warning_buffer: 0.1
  acceleration_triggers:
  - interest_coverage
  - net_debt_ebitda
  thresholds:
    net_debt_ebitda_max: 4.5
    interest_coverage_min: 2.0
    debt_to_equity_max: 4.0
    current_ratio_min: 1.0
    ebitda_margin_min: 0.05
rating:
  methodology: sp
  industry_adjustment: -6.0
  size_adjustment: 2.0
  cycle_avg_ebitda_margin: 0.12
  weights:
    leverage: 0.35
    coverage: 0.3
    profitability: 0.2
    liquidity: 0.15
