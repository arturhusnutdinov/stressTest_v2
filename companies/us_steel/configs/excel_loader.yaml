schedules:
  leases:
    sheet: schedule_leases
    group_columns:
      lease_type: lease_type
    rules:
    - target_statement: schedule_leases
      target_metric: rou_asset_finance
      filter:
        lease_type: finance
      components:
      - metric: financeleaserightofuseasset
    - target_statement: schedule_leases
      target_metric: rou_asset_operating
      filter:
        lease_type: operating
      components:
      - metric: operatingleaserightofuseasset
    - target_statement: schedule_leases
      target_metric: lease_liab_current_finance
      filter:
        lease_type: finance
      components:
      - metric: financeleaseliabilitycurrent
    - target_statement: schedule_leases
      target_metric: lease_liab_current_operating
      filter:
        lease_type: operating
      components:
      - metric: operatingleaseliabilitycurrent
    - target_statement: schedule_leases
      target_metric: lease_liab_noncurrent_finance
      filter:
        lease_type: finance
      components:
      - metric: financeleaseliabilitynoncurrent
    - target_statement: schedule_leases
      target_metric: lease_liab_noncurrent_operating
      filter:
        lease_type: operating
      components:
      - metric: operatingleaseliabilitynoncurrent
    - target_statement: BS
      target_metric: lease_liab_current
      components:
      - metric: current_lease_liability
      - metric: lease_liab_current
      - metric: lease_liab_cur
      - metric: operatingleaseliabilitycurrent
      - metric: financeleaseliabilitycurrent
    - target_statement: BS
      target_metric: lease_liab_noncurrent
      components:
      - metric: long_term_lease_liability
      - metric: lease_liab_noncurrent
      - metric: lease_liab_ncur
      - metric: operatingleaseliabilitynoncurrent
      - metric: financeleaseliabilitynoncurrent
    - target_statement: CF
      target_metric: lease_payments_cff_finance
      filter:
        lease_type: finance
      components:
      - metric: financeleaseprincipalpayments
    - target_statement: CF
      target_metric: lease_payments_cfo_operating
      filter:
        lease_type: operating
      components:
      - metric: operatingleasepayments
    - target_statement: IS
      target_metric: lease_interest_finance
      filter:
        lease_type: finance
      components:
      - metric: lease_interest_finance
    - target_statement: IS
      target_metric: lease_interest_operating
      filter:
        lease_type: operating
      components:
      - metric: lease_interest_operating
    - target_statement: IS
      target_metric: dep_rou_finance
      filter:
        lease_type: finance
      components:
      - metric: dep_rou_finance
    - target_statement: IS
      target_metric: dep_rou_operating
      filter:
        lease_type: operating
      components:
      - metric: dep_rou_operating
    - target_statement: IS
      target_metric: lease_expense_operating
      filter:
        lease_type: operating
      components:
      - metric: lease_expense_operating
    - target_statement: schedule_leases
      target_metric: finance_lease_rate
      filter:
        lease_type: finance
      components:
      - metric: finance_lease_rate
    - target_statement: schedule_leases
      target_metric: finance_principal_share
      filter:
        lease_type: finance
      components:
      - metric: finance_principal_share
    - target_statement: schedule_leases
      target_metric: finance_lease_avg_remaining_term
      filter:
        lease_type: finance
      components:
      - metric: finance_lease_avg_remaining_term
    - target_statement: schedule_leases
      target_metric: finance_lease_weighted_avg_discount_rate
      filter:
        lease_type: finance
      components:
      - metric: finance_lease_weighted_avg_discount_rate
    - target_statement: schedule_leases
      target_metric: operating_lease_rate
      filter:
        lease_type: operating
      components:
      - metric: operating_lease_rate
    - target_statement: schedule_leases
      target_metric: operating_principal_share
      filter:
        lease_type: operating
      components:
      - metric: operating_principal_share
    - target_statement: schedule_leases
      target_metric: operating_lease_avg_remaining_term
      filter:
        lease_type: operating
      components:
      - metric: operating_lease_avg_remaining_term
    - target_statement: schedule_leases
      target_metric: operating_lease_weighted_avg_discount_rate
      filter:
        lease_type: operating
      components:
      - metric: operating_lease_weighted_avg_discount_rate
  ppe:
    sheet: schedule_ppe
    rules:
    - target_statement: IS
      target_metric: depreciation_owned
      components:
      - metric: depreciation_owned
      - metric: depreciation
    - target_statement: CF
      target_metric: capex
      components:
      - metric: paymentstoacquirepropertyplantandequipment
    - target_statement: CF
      target_metric: disposal_proceeds
      components:
      - metric: proceedsfromsaleofpropertyplantandequipment
    - target_statement: BS
      target_metric: ppe_gross
      components:
      - metric: propertyplantandequipmentgross
    - target_statement: BS
      target_metric: ppe_accum_dep
      components:
      - metric: accumulateddepreciationdepletionandamortizationpropertyplantandequipment
  tax:
    sheet: schedule_tax
    rules:
    - target_statement: IS
      target_metric: tax_expense
      components:
      - metric: incometaxexpensebenefit
    - target_statement: CF
      target_metric: tax_paid
      components:
      - metric: incometaxespaidnet
    - target_statement: BS
      target_metric: dta
      components:
      - metric: deferredtaxassetsnet
      - metric: deferred_tax_assets
      - metric: dta
      - metric: dta_noncurrent
    - target_statement: BS
      target_metric: dtl
      components:
      - metric: deferredtaxliabilitiesnet
      - metric: deferred_tax_liabilities
      - metric: dtl
      - metric: dtl_noncurrent
    # NOL carryforward — loaded from project.yaml (taxes.nol_opening_balance, $M)
    # Not loaded from Excel; configured in project.yaml
    # Model fields: nol_opening_balance, nol_max_utilization_pct (TCJA 80% rule)
  # Capitalized interest — loaded from IS (interest_capitalized) or BS (capitalized_interest_balance)
  capitalized_interest:
    sheet: schedule_capint
    optional: true
    rules:
    - target_statement: IS
      target_metric: interest_capitalized
      components:
      - metric: interest_capitalized
      - metric: capitalized_interest
      - metric: interestcosts_capitalized
    - target_statement: BS
      target_metric: capitalized_interest_balance
      components:
      - metric: capitalized_interest_balance
      - metric: unamortized_capitalized_interest
  # Lease_Schedule sheet (new v3 export format) — maturity schedule from 10-K
  lease_maturity_schedule:
    sheet: Lease_Schedule
    optional: true
    columns:
      year: Year
      lease_type: Type
      lease_id: Lease_ID
      lease_name: Lease_Name
      rou_open: ROU_open $M
      rou_dep: ROU_dep $M
      rou_close: ROU_close $M
      liab_open: Liab_open $M
      interest_exp: Int_exp $M
      payment: Payment $M
      liab_close: Liab_close $M
      discount_rate: Disc_rate
    unit: M
    # Values in sheet are $M — loader multiplies by 1e6 for DB storage
  debt:
    instruments_sheet: debt_instruments
    cashflows_sheet: debt_cashflows
    instrument_columns:
      id: instrument_id
      name: instrument_name
      type: instrument_type
      currency: currency
      opening_balance: opening_balance
      committed_amount: committed_amount
      maturity_date: maturity_date
      interest_rate: interest_rate
      rate_type: rate_type
      spread: spread
      base_rate: base_rate
      payment_frequency: payment_frequency
      amortization_profile: amortization_profile
      security_type: security_type
      priority_rank: priority_rank
      covenant_package: covenant_package
      callable_flag: callable_flag
      call_schedule: call_schedule
    cashflow_columns:
      instrument_id: instrument_id
      year: year
      period: period
      cashflow_type: cashflow_type
      amount: amount
      currency: currency
      note: note
    cashflow_mapping:
      principal:
        aliases:
        - principal_payment
      interest:
        aliases:
        - interest_payment
      drawdown:
        aliases:
        - drawdown
      fee:
        aliases:
        - fee
