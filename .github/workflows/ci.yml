name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=engine --cov-report=term-missing
        env:
          STRESSTEST_ROOT: ${{ github.workspace }}

      - name: Parser smoke tests
        run: |
          if ls companies/*/data/statements/*.pdf 1>/dev/null 2>&1; then
            python -m pytest tests/ -v --tb=short -k "parser" || echo "Parser tests failed (PDF-dependent, non-blocking)"
          else
            echo "No PDF files found — skipping parser smoke tests"
          fi
        env:
          STRESSTEST_ROOT: ${{ github.workspace }}
        continue-on-error: true

      - name: Type checking (mypy)
        run: |
          pip install mypy
          python -m mypy engine/ --ignore-missing-imports --no-error-summary || echo "mypy found issues (non-blocking)"
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check engine/ --ignore=E501,F841
