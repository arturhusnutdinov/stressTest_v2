version: "3.8"

services:
  engine:
    build: .
    volumes:
      - ./data_mart_v2.db:/app/data_mart_v2.db
      - ./companies:/app/companies
    command: us_steel

  jupyter:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - .:/app
      - ./data_mart_v2.db:/app/data_mart_v2.db
    command: >
      jupyter notebook
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      --notebook-dir=/app/notebooks

  test:
    build: .
    volumes:
      - ./data_mart_v2.db:/app/data_mart_v2.db
    command: python -m pytest tests/ -v
