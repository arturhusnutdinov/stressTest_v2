# ═══════════════════════════════════════════════════════════════
# Stress Scenarios Template — stressTest_v2 Engine
# ═══════════════════════════════════════════════════════════════
# Copy to: companies/{company}/configs/stress_scenarios.yaml
# Orchestrator auto-reads this file for the company.
#
# Shock types:
#   macro_shocks  — applied to macro_forecasts (commodity prices, FX, rates)
#   driver_shocks — applied to model drivers (cogs_pct, dso_days, avg_rate)
#
# Value types:
#   percentage — multiply factor by (1 + value/100): {type: percentage, value: -25.0}
#   pp         — add percentage points to ratio:     {type: pp, value: 3.0}
#   level      — set to absolute value:              {type: level, value: 50.0}
#
# NOTE: Replace COMMODITY_FACTOR and FX_PAIR placeholders with your
# company-specific macro factors from project.yaml → macro_forecast.factors[].
#
# Common commodity factors:
#   steel_price_hrc, lme_aluminium, lme_nickel, lme_copper, brent,
#   iron_ore_price, lme_palladium, lme_platinum, gold_price
#
# Common FX pairs:
#   usd_rub, usd_eur, usd_cny, dxy
#
# Common energy factors:
#   russian_power_price, natural_gas_price, electricity_price
#
# NOTE: If CogsBlock (cogs.mode=component) is active, macro_shocks on
# commodity/energy factors flow through automatically.
# Remove redundant driver_shocks.cogs_pct in that case.

scenarios:

  # ── Commodity Downturn ───────────────────────────────────────
  commodity_downturn:
    description: "Primary commodity -25%, WC deterioration"
    macro_shocks:
      # ⚠ REPLACE with your primary commodity factor:
      #   steel_price_hrc / lme_aluminium / lme_nickel / brent / etc.
      COMMODITY_FACTOR:
        type: percentage
        value: -25.0
    driver_shocks:
      dso_days:
        type: percentage
        value: 15.0
      dih_days:
        type: percentage
        value: 20.0

  # ── FX Shock ────────────────────────────────────────────────
  fx_shock:
    description: "Local currency devaluation +30%"
    macro_shocks:
      # ⚠ REPLACE with your FX pair: usd_rub / usd_eur / usd_cny
      FX_PAIR:
        type: percentage
        value: 30.0

  # ── Energy Spike ────────────────────────────────────────────
  energy_spike:
    description: "Energy cost +40%, oil +30%"
    macro_shocks:
      # ⚠ REPLACE with your energy factor:
      #   russian_power_price / natural_gas_price / electricity_price
      ENERGY_FACTOR:
        type: percentage
        value: 40.0
      brent:
        type: percentage
        value: 30.0

  # ── Rate Spike ──────────────────────────────────────────────
  rate_spike:
    description: "Interest rate +200bp across all instruments"
    driver_shocks:
      avg_rate:
        type: pp
        value: 2.0

  # ── Covenant Breach (combined severe shock) ─────────────────
  covenant_breach:
    description: "Combined: commodity -20%, rates +200bp, WC stress"
    macro_shocks:
      # ⚠ REPLACE with your primary commodity factor
      COMMODITY_FACTOR:
        type: percentage
        value: -20.0
    driver_shocks:
      avg_rate:
        type: pp
        value: 2.0
      dso_days:
        type: percentage
        value: 10.0
      dih_days:
        type: percentage
        value: 10.0

  # ── Demand Shock (v2.3) ──────────────────────────────────────
  demand_shock:
    description: "Global recession — commodity -15%, WC deterioration"
    macro_shocks:
      # ⚠ REPLACE with your primary commodity factor
      COMMODITY_FACTOR:
        type: percentage
        value: -15.0
    driver_shocks:
      dso_days:
        type: percentage
        value: 20.0
      dih_days:
        type: percentage
        value: 25.0
