# Шаблон мэппинга статей отчетности к канонической форме модели
# Copy to: companies/{company}/configs/excel_loader.yaml (simple version)
# See also: excel_loader_template.yaml (recommended)

is:
  source_file: companies/{company}/history/is_history_{company}.csv
  date_column: date
  currency: RUB
  items:
    revenue:
      source_columns: [Revenue, Sales]
      scale: 1
    # Опциональные breakdown метрики (если доступны в исходных данных):
    # revenue_product:
    #   source_columns: [Product_Revenue, Goods_Revenue]
    #   scale: 1
    # revenue_service:
    #   source_columns: [Service_Revenue]
    #   scale: 1
    cogs:
      source_columns: [COGS, Cost_of_Sales]
      scale: 1
    # Опциональные breakdown метрики COGS:
    # cogs_materials:
    #   source_columns: [Materials_Cost]
    #   scale: 1
    # cogs_labor:
    #   source_columns: [Labor_Cost]
    #   scale: 1
    sgna:
      source_columns: [SG&A, Operating_Expenses]
      scale: 1
    # Опциональные breakdown метрики SGA:
    # sga_selling:
    #   source_columns: [Selling_Expense]
    #   scale: 1
    # sga_general_admin:
    #   source_columns: [G&A, Administrative_Expense]
    #   scale: 1
    depreciation:
      source_columns: [Depreciation]
      scale: 1
    interest_expense:
      source_columns: [Interest_Expense]
      scale: 1
    # Опциональные breakdown метрики налогов:
    # current_tax_expense:
    #   source_columns: [Current_Tax]
    #   scale: 1
    # deferred_tax_expense:
    #   source_columns: [Deferred_Tax]
    #   scale: 1
    taxes_paid:
      source_columns: [Taxes]
      scale: 1

